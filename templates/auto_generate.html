<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-3xl bg-white rounded-3xl shadow-xl p-8">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800">
                AI GENERATE QUESTION
            </h1>
            <p class="text-gray-500 mt-2">

            </p>
        </div>

        <!-- Form -->
        <form method="POST" class="space-y-5">

            <!-- Topic -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Topic
                </label>

                <input type="text" name="topic" placeholder="e.g. Mathematics, Python, Science" class="w-full px-4 py-3 rounded-2xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-black transition" required>
            </div>

            <!-- Button -->
            <button type="submit" class="w-full bg-black text-white py-3 rounded-2xl font-medium hover:bg-gray-800 transition">

                Generate Questions

            </button>

        </form>

        <!-- Output -->
        {% if questions %}

        <div class="mt-10">

            <h2 class="text-2xl font-semibold text-gray-800 mb-4">
                Generated Questions
            </h2>

            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-6 max-h-[500px] overflow-auto shadow-inner">

                <pre class="whitespace-pre-wrap text-sm text-gray-700 leading-7">{{ questions }}</pre>

            </div>

        </div>

        {% endif %}

    </div>

</body>

</html>
